<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#111;
z-index:1000;
box-sizing:border-box;
}

nav div:last-child{
display:flex;
gap:12px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#00ff88;
}

/* SECTION */

.section{
padding:120px 40px;
}

h2{
color:#00ff88;
margin-top:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
height:180px;
background:#1a1a1a;
border-radius:12px;
position:relative;
cursor:pointer;
transition:0.3s;
overflow:hidden;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff88;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:32px;
color:#00ff88;
}

</style>

</head>
