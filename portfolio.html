nav{

}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
height:180px;
background:#1a1a1a;
border-radius:12px;
position:relative;
cursor:pointer;
transition:0.3s;
overflow:hidden;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff88;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:32px;
color:#00ff88;
}

/* MODAL */

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

iframe{
width:100%;
height:100%;
border:none;
}
